<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Golf flag on a pin -->
  <circle cx="16" cy="16" r="16" fill="#2d6a4f"/>
  <!-- Pin -->
  <line x1="14" y1="8" x2="14" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Flag -->
  <polygon points="14,8 22,12 14,16" fill="white"/>
  <!-- Ball -->
  <circle cx="14" cy="24" r="2.5" fill="white"/>
</svg>
